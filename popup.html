<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="popup.css"/>
</head>
<body>
  <div class="container">
    <h1>Auto Refresh</h1>

    <label for="target-url">Target URL</label>
    <input type="text" id="target-url" spellcheck="false" placeholder="https://example.com"/>

    <div class="row">
      <div class="field">
        <label for="interval">Interval</label>
        <input type="number" id="interval" min="1" value="60"/>
      </div>
      <div class="field">
        <label for="unit">Unit</label>
        <select id="unit">
          <option value="seconds" selected>Seconds</option>
          <option value="minutes">Minutes</option>
        </select>
      </div>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="match-prefix" checked/>
      <label for="match-prefix">Match URL prefix only</label>
    </div>

    <div class="actions">
      <button id="start-btn" class="btn btn-start">Start</button>
      <button id="stop-btn" class="btn btn-stop" disabled>Stop</button>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
